name: Auto-approve Owner PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    if: github.actor == 'romankolosok'

    steps:
      - name: Approve Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve -b "Automated approval for the repository owner ✅"
